<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelateria Cavallar</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #FADFB9;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .logo {
      width: 120px;
      height: 120px;
      background-color: #e8c990;
      border-radius: 50%;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2E1205;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: #2E1205;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    ul {
      list-style: none;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    li a {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background-color: #FADFB9;
      border: 1px solid #f0e0c0;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      color: #2E1205;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    li a:active {
      background-color: #f0d0a0;
    }
  </style>
</head>
<body>

  <div class="logo">LOGO</div>

  <h1>Benvenuto alla<br>Gelateria Cavallar!</h1>

  <ul>
    <li><a href="#">Lascia una recensione su Google</a></li>
    <li><a href="#">Menu Gelati Italiano</a></li>
    <li><a href="#">Menu Gelati Deutsch</a></li>
    <li><a href="#">Menu Gelati English</a></li>
    <li><a href="#">Menu Bar</a></li>
    <li><a href="#">Carta Vini</a></li>
    <li><a href="#">La Nostra Storia</a></li>
    <li><a href="#">Instagram</a></li>
    <li><a href="#">Facebook</a></li>
  </ul>

</body>
</html>
