<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelateria Cavallar</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-image: url('sfondo.png');
background-size: cover;
background-position: center;
background-attachment: fixed;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 20px;
      min-height: 100vh;
    }
    .logo {
      width: 150px;
      height: 150px;
      background-color: #e8c990;
      border-radius: 50%;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2E1205;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    h1 {
      font-weight: 600;
      font-size: 16px;
      color: #2E1205;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.4;
      text-transform: uppercase;
    }
    ul {
      list-style: none;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    li a {
      display: block;
      width: 100%;
      padding: 10px 20px;
      background-color: #FEF1EF;
      border: 1.5px solid #FEF1EF;
      border-radius: 999px;
      text-align: center;
      text-decoration: none;
      color: #2E1205;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 1px;
    }
    li a:active {
      background-color: #f0d0a0;
    }
  </style>
</head>
<body>

  <img src="logo_gelateria cavallar.png" alt="Gelateria Cavallar" style="width: 150px; height: 150px; object-fit: contain; margin-bottom: 20px;">

  <h1>Benvenuto alla<br>Gelateria Cavallar!</h1>

  <ul>
    <li><a href="#">☀️ LA NOSTRA STORIA</a></li>
    <li><a href="#">⭐ LASCIA UNA RECENSIONE</a></li>
    <li><a href="#">🍦 CARTA DEI GELATI - Italiano</a></li>
    <li><a href="#">🍦 CARTA DEI GELATI - Deutsch</a></li>
    <li><a href="#">🍦 CARTA DEI GELATI - English</a></li>
    <li><a href="#">🍸 MENU BAR</a></li>
    <li><a href="#">🍷 CARTA VINI</a></li>
</ul>

  <p style="text-align: center; color: #2E1205; font-size: 12px; letter-spacing: 1px; margin-top: 24px; line-height: 1.8;">
    Seguici su Instagram e Facebook<br>
    <strong>@gelateria.cavallar</strong>
  </p>

</body>
</html>
